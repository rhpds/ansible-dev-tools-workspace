---
ansible-navigator:
  execution-environment:
    enabled: false
    image: ghcr.io/ansible/community-ansible-dev-tools:latest
    pull:
      policy: missing

  logging:
    level: warning
    append: false
    file: /tmp/ansible-navigator.log

  playbook-artifact:
    enable: true
    save-as: "/tmp/{playbook_name}-artifact-{time_stamp}.json"

  mode: stdout

  color:
    enable: true
    osc4: true
