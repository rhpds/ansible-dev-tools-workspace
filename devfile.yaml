schemaVersion: 2.2.2
metadata:
  name: ansible-devspaces-summit
components:
  - name: tooling-container
    # --- BEGIN nested podman overrides ---
    # Required for rootless podman with user namespaces.
    # Dev Spaces 3.25+/OCP 4.20+ operators may auto-inject these, but older versions
    # and clusters with custom SCCs (e.g. nested-podman-scc) require them explicitly.
    # Without these, the pod fails SCC validation with:
    #   "hostUsers must be set to false" / SETUID/SETGID capabilities not allowed
    attributes:
      pod-overrides:
        metadata:
          annotations:
            io.kubernetes.cri-o.Devices: "/dev/fuse,/dev/net/tun"
        spec:
          hostUsers: false
      container-overrides:
        securityContext:
          procMount: Unmasked
          capabilities:
            add:
              - AUDIT_WRITE
    # --- END nested podman overrides ---
    container:
      image: ghcr.io/ansible/ansible-devspaces:v26.4.4
      memoryRequest: 2Gi
      memoryLimit: 4Gi
      cpuRequest: 500m
      cpuLimit: 2000m
      env:
        - name: ANSIBLE_HOME
          value: /projects/ansible-devspaces-summit/.ansible
        - name: HOSTNAME
          value: ansible-devspaces
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/ansible-devspaces-summit/devspaces.code-workspace
