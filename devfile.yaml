schemaVersion: 2.2.2
metadata:
  name: ansible-demo
components:
  - name: tooling-container
    container:
      image: ghcr.io/ansible/ansible-devspaces:latest
      memoryRequest: 256M
      memoryLimit: 6Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: "ANSIBLE_COLLECTIONS_PATH"
          value: "~/.ansible/collections:/usr/share/ansible/collections:/projects/ansible-devspaces-summit/collections"
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/ansible-devspaces-summit/devspaces.code-workspace
