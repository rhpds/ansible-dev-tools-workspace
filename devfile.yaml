schemaVersion: 2.2.2
metadata:
  name: ansible-dev-tools-workspace
components:
  - name: tooling-container
    container:
      image: ghcr.io/ansible/ansible-devspaces:v26.4.5
      memoryRequest: 2Gi
      memoryLimit: 4Gi
      cpuRequest: 500m
      cpuLimit: 1000m
      env:
        - name: SHELL
          value: /bin/bash
        - name: ANSIBLE_HOME
          value: /projects/ansible-dev-tools-workspace/.ansible
        - name: HOSTNAME
          value: ansible-devspaces
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/ansible-dev-tools-workspace/devspaces.code-workspace
        - name: ADT_CONTAINER_ENGINE
          value: podman
